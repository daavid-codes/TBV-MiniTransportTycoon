name: Unity CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Run Unity Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Mini Transport Tycoon/Library
          key: Library-${{ hashFiles('Mini Transport Tycoon/Assets/**', 'Mini Transport Tycoon/Packages/**', 'Mini Transport Tycoon/ProjectSettings/**') }}

      - name: Run Unity Tests
        id: tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.62f3
          projectPath: Mini Transport Tycoon
          githubToken: ""
          testMode: editmode
          enableCodeCoverage: true
          coverageOptions: generateAdditionalMetrics;generateHtmlReport
          customParameters: >-
            -pathFilters:+Assets/Scripts/Bus.cs,+Assets/Scripts/Car.cs,+Assets/Scripts/CarType.cs,+Assets/Scripts/GameController.cs,+Assets/Scripts/GameData.cs,+Assets/Scripts/MenuController.cs,+Assets/Scripts/TopBarManager.cs,+Assets/Scripts/MainMenu.cs,+Assets/Scripts/Vehicle.cs

      - name: Debug Coverage Paths
        if: always()
        run: |
          echo "artifactsPath=${{ steps.tests.outputs.artifactsPath }}"
          echo "coveragePath=${{ steps.tests.outputs.coveragePath }}"
          ls -la "${{ steps.tests.outputs.artifactsPath }}" || true
          ls -la "${{ steps.tests.outputs.coveragePath }}" || true

      - name: Prepare Coverage Artifact Folder
        if: always()
        run: |
          set -eu
          rm -rf coverage-artifact
          mkdir -p coverage-artifact

          copied=false

          if [ -d "${{ steps.tests.outputs.coveragePath }}" ]; then
            cp -R "${{ steps.tests.outputs.coveragePath }}" coverage-artifact/CodeCoverage
            copied=true
          fi

          if [ -d "${{ steps.tests.outputs.artifactsPath }}" ]; then
            first_match="$(find "${{ steps.tests.outputs.artifactsPath }}" -type d -name CodeCoverage | head -n 1 || true)"
            if [ -n "$first_match" ] && [ "$copied" = false ]; then
              cp -R "$first_match" coverage-artifact/CodeCoverage
              copied=true
            fi
          fi

          if [ "$copied" = false ]; then
            echo "Coverage output was not found in this run." > coverage-artifact/README.txt
          fi

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: coverage-artifact/**

      - name: Generate Coverage Summary
        uses: danielpalme/ReportGenerator-GitHub-Action@ee3806a36b8b2eb9594cb3e5fae045af7e5ead10 # v5.5.6
        with:
          reports: ${{ steps.tests.outputs.coveragePath }}/**/TestCoverageResults_*.xml
          targetdir: coverage-summary
          reporttypes: MarkdownSummaryGithub

      - name: Write Coverage to Job Summary
        run: cat coverage-summary/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Post Coverage Comment on PR
        uses: marocchino/sticky-pull-request-comment@331f8f5b4215f0445d3c07b4967662a32a2d3e31 # v2.9.0
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: coverage-summary/SummaryGithub.md

  build:
    name: Build Unity Project
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Mini Transport Tycoon/Library
          key: Library-${{ hashFiles('Mini Transport Tycoon/Assets/**', 'Mini Transport Tycoon/Packages/**', 'Mini Transport Tycoon/ProjectSettings/**') }}

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.62f3
          targetPlatform: StandaloneWindows64
          projectPath: Mini Transport Tycoon
          versioning: None

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: Build
          path: build
